name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            ext: .exe
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install UI deps
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Go vet
        run: go vet ./...

      - name: Build binary
        run: go build -trimpath -ldflags "-s -w" -o conduit${{ matrix.ext }} .

      - uses: actions/upload-artifact@v4
        with:
          name: conduit-${{ matrix.os }}
          path: conduit${{ matrix.ext }}
