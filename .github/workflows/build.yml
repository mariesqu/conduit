name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install UI deps
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -count=1 ./...

      - name: Derive binary name
        id: bin
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "name=conduit.exe" >> "$GITHUB_OUTPUT"
          else
            echo "name=conduit" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        run: go build -trimpath -ldflags "-s -w" -o ${{ steps.bin.outputs.name }} .

      - uses: actions/upload-artifact@v4
        with:
          name: conduit-${{ matrix.os }}
          path: ${{ steps.bin.outputs.name }}
